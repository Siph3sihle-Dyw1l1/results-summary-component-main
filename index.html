<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- displays site properly based on user's device -->

    <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">

    <title>Frontend Mentor | Results summary component</title>

    <link rel="stylesheet" href="style.css">


</head>

<body>
    <main>

        <div class="container_card">

            <section class="result_pnl">
                <h2>Your Result</h2>

                <div class="score_circle">

                    <span class="score_number" id="avg_score">--</span>

                    <span class="score_total">of 100</span>
                </div>

                <h3>Great</h3>

                <p>
                    You scored higher than 65% of the people who have taken these tests.
                </p>

            </section>

            <section class="summary_pnl">
                <h2>Summary</h2>

                <ul class="summary_list" id="summary_list">

                </ul>

                <button class="continue_btn">Continue</button>
            </section>
        </div>

    </main>

    <footer class="attribution">
        Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>.
        Coded by <a href="https://github.com/Siph3sihle-Dyw1l1">Siphesihle Dywili</a>.
    </footer>

    <script src="script.js"></script>
</body>

</html>
