<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- displays site properly based on user's device -->

    <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">

    <title>Frontend Mentor | Results summary component</title>

    <link rel="stylesheet" href="style.css">


</head>

<body>
    <main>

        <div class="card">

            <section class="resul-panel">
                <h2 class="result-title">Your Result</h2>

                <div class="score-circle">

                    <span class="score-number" id="average-score">--</span>

                    <span class="score-out-of">of 100</span>
                </div>

                <h3 class="result-rating">Great</h3>

                <p class="result-description">
                    You scored higher than 65% of the people who have taken these tests.
                </p>

            </section>

            <section class="summary-panel">
                <h2 class="summary-title">Summary</h2>

                <ul class="summary-list" id="summary-list">

                </ul>

                <button class="continue-btn">Continue</button>
            </section>
        </div>

    </main>

    <footer class="attribution">
        Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>.
        Coded by <a href="https://github.com/Siph3sihle-Dyw1l1">Siphesihle Dywili</a>.
    </footer>

    <script src="script.js"></script>
</body>

</html>
